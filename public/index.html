<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro - Versión Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: {
                extend: {
                    keyframes: {
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '25%': { transform: 'translateX(-5px)' },
                            '75%': { transform: 'translateX(5px)' },
                        }
                    },
                    animation: {
                        shake: 'shake 0.2s ease-in-out 0s 2'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 font-sans min-h-screen p-4 md:p-10 transition-colors duration-300 text-slate-900 dark:text-slate-100 [scrollbar-width:none] [-ms-overflow-style:none] [&::-webkit-scrollbar]:hidden">

    <div class="max-w-6xl mx-auto bg-white dark:bg-slate-900 rounded-3xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
        
        <header id="main-header" class="bg-indigo-600 p-6 flex justify-between items-center text-white transition-all duration-500">
            <div class="flex items-center gap-3">
                <i data-lucide="check-check" class="w-8 h-8"></i>
                <h1 class="text-2xl font-black tracking-tighter">TaskFlow <span class="font-light opacity-80">Pro</span></h1>
            </div>
            <button id="theme-toggle" class="p-3 rounded-2xl bg-black/10 hover:bg-black/20 transition-all border border-white/10">
                <i id="theme-icon" data-lucide="moon" class="w-5 h-5"></i>
            </button>
        </header>

        <div class="flex flex-col md:flex-row">
            <aside class="w-full md:w-72 bg-slate-50/50 dark:bg-slate-800/30 p-8 border-r border-slate-100 dark:border-slate-800 [scrollbar-width:none] [-ms-overflow-style:none] [&::-webkit-scrollbar]:hidden">
                <nav class="mb-10">
                    <h2 class="text-slate-400 font-bold uppercase text-[11px] tracking-[0.2em] mb-6">Filtros</h2>
                    <ul class="barra-lateral space-y-2">
                        <li data-filter="all" aria-pressed="true" class="filter-btn flex items-center gap-3 cursor-pointer p-3.5 rounded-2xl bg-indigo-600 text-white font-bold shadow-lg active-filter transition-all">
                            <i data-lucide="layers" class="w-4 h-4"></i> Todas
                        </li>
                        <li data-filter="trabajo" aria-pressed="false" class="filter-btn flex items-center gap-3 cursor-pointer p-3.5 rounded-2xl text-slate-500 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-800 transition-all">
                            <i data-lucide="briefcase" class="w-4 h-4"></i> Trabajo
                        </li>
                        <li data-filter="casa" aria-pressed="false" class="filter-btn flex items-center gap-3 cursor-pointer p-3.5 rounded-2xl text-slate-500 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-800 transition-all">
                            <i data-lucide="home" class="w-4 h-4"></i> Casa
                        </li>
                        <li data-filter="estudios" aria-pressed="false" class="filter-btn flex items-center gap-3 cursor-pointer p-3.5 rounded-2xl text-slate-500 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-800 transition-all">
                            <i data-lucide="graduation-cap" class="w-4 h-4"></i> Estudios
                        </li>
                    </ul>
                </nav>

                <div class="pt-8 border-t border-slate-200 dark:border-slate-700">
                    <h2 class="text-slate-400 font-bold uppercase text-[11px] tracking-[0.2em] mb-4">Color de Identidad</h2>
                    <div class="flex items-center gap-4 p-4 bg-white dark:bg-slate-800 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700">
                        <label for="custom-color-picker" class="relative cursor-pointer">
                            <div id="color-preview" class="w-12 h-12 rounded-full border-4 border-slate-50 dark:border-slate-900 shadow-inner"></div>
                            <input type="color" id="custom-color-picker" value="#4f46e5" class="absolute inset-0 opacity-0 cursor-pointer">
                        </label>
                        <div>
                            <p class="text-sm font-bold">Paleta</p>
                            <p class="text-[10px] text-slate-400 uppercase">Personalizada</p>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="flex-1 p-6 md:p-12 space-y-10">
                <form id="task-form" class="space-y-6" novalidate>
                    <div class="space-y-2 relative">
                        <label class="text-[11px] font-bold uppercase text-slate-400 tracking-wider">¿Qué hay que hacer?</label>
                        <input type="text" id="task-input" placeholder="Escribe tu próxima tarea..." 
                               class="w-full p-5 rounded-3xl border-2 border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50 outline-none transition-all text-lg font-medium focus:ring-2 focus:ring-indigo-500">
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                        <div class="space-y-2">
                            <label class="text-[11px] font-bold uppercase text-slate-400 tracking-wider">Fecha</label>
                            <input type="date" id="task-date-input" class="w-full p-4 rounded-2xl border-2 border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 outline-none">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[11px] font-bold uppercase text-slate-400 tracking-wider">Categoría</label>
                            <select id="task-category-select" class="w-full p-4 rounded-2xl border-2 border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 outline-none">
                                <option value="trabajo">💼 Trabajo</option>
                                <option value="casa">🏠 Casa</option>
                                <option value="estudios">📚 Estudios</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[11px] font-bold uppercase text-slate-400 tracking-wider">Prioridad</label>
                            <select id="task-priority-select" class="w-full p-4 rounded-2xl border-2 border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 outline-none">
                                <option value="baja">Baja</option>
                                <option value="media" selected>Media</option>
                                <option value="alta">Alta</option>
                            </select>
                        </div>
                        <button type="submit" id="add-btn" class="bg-indigo-600 text-white p-4 rounded-2xl h-[60px] flex items-center justify-center transition-all active:scale-95 hover:scale-105 shadow-xl shadow-indigo-500/20 font-bold mt-auto group">
                            <i data-lucide="plus" class="w-6 h-6 group-hover:rotate-90 transition-transform duration-300"></i>
                        </button>
                    </div>
                </form>

                <div class="relative">
                    <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                    <input type="search" id="search-input" placeholder="Buscar entre mis tareas..." 
                           class="w-full p-5 pl-14 rounded-3xl bg-slate-100/50 dark:bg-slate-800/50 border-none focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
                </div>

                <div id="task-list" class="space-y-4"></div>
                <div id="empty-state" class="hidden text-center py-20 animate-pulse">
                    <i data-lucide="clipboard-list" class="w-16 h-16 mx-auto text-slate-200 dark:text-slate-700 mb-4"></i>
                    <p class="text-slate-400 font-medium">No se encontraron tareas</p>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="cliente.js"></script>
    <script src="app.js"></script>
</body>
</html>
