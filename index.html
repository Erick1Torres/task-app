<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas Académico</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="contenedor-background">
        <header>
            <h1>Gestor de Tareas</h1>
        </header>

        <div class="layout-flex">
            <aside class="barra-lateral">
                <nav>
                    <ul>
                        <li class="filtro-all active">Todas</li>
                        <li class="filtro-materia1">BBDD</li>
                        <li class="filtro-materia2">FOL</li>
                        <li class="filtro-materia3">Marcas</li>
                    </ul>
                </nav>
            </aside>

            <main class="lista-tareas">
                <section class="task alta">
                    <span class="title">Conexiones SQL</span>
                    <span class="category">Bases de Datos</span>
                    <span class="priority">Alta</span>
                </section>

                <section class="task media">
                    <span class="title">Riesgos Laborales</span>
                    <span class="category">FOL</span>
                    <span class="priority">Media</span>
                </section>

                <section class="task baja">
                    <span class="title">Maquetación CSS</span>
                    <span class="category">Lenguaje Marcas</span>
                    <span class="priority">Baja</span>
                </section>
            </main>
        </div>
    </div>
</body>
</html>
