<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas Académico</title>
    <link rel="stylesheet" href="styles.css">
    </head>
<body>

    <div class="contenedor-background">
        <header>
            <h1>Gestor de Tareas</h1>
        </header>

        <div class="layout-flex">
            <aside class="barra-lateral">
                <nav>
                    <h2>Categorías</h2>
                    <ul>
                        <li data-filter="all" class="filtro-all active">Todas</li>
                        <li data-filter="trabajo" class="filtro-materia1">Trabajo</li>
                        <li data-filter="casa" class="filtro-materia2">Casa</li>
                        <li data-filter="estudios" class="filtro-materia3">Estudios</li>
                    </ul>
                </nav>
            </aside>

            <main class="lista-tareas">
                <form id="task-form">
    <input type="text" id="task-input" placeholder="Nombre de la tarea..." required>
    <select id="task-category-select">
        <option value="trabajo">Trabajo</option>
        <option value="casa">Casa</option>
        <option value="estudios">Estudios</option>
    </select>
    <select id="task-priority-select">
        <option value="alta">Alta</option>
        <option value="media">Media</option>
        <option value="baja">Baja</option>
    </select>
    <button type="submit">Añadir</button>
</form>

<input type="text" id="search-input" placeholder="Filtrar por nombre...">

                <div id="task-list">
                    </div>
            </main>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
