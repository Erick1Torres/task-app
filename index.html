<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TaskFlow Pro - Gestor de tareas personales con modo oscuro, filtros por categoría y prioridad">
    <title>TaskFlow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 font-sans min-h-screen p-4 md:p-10 transition-colors duration-300 text-slate-900 dark:text-slate-100">

    <div class="max-w-5xl mx-auto bg-white dark:bg-slate-900 rounded-3xl shadow-xl overflow-hidden border border-slate-200 dark:border-slate-800">
        
        <header class="bg-indigo-600 dark:bg-indigo-900 p-6 flex justify-between items-center text-white">
            <div class="flex items-center gap-3">
                <i data-lucide="check-circle" class="w-8 h-8" aria-hidden="true"></i>
                <h1 class="text-xl font-bold tracking-tight text-white">TaskFlow Pro</h1>
            </div>
            
            <button id="theme-toggle" type="button" aria-label="Alternar modo oscuro" class="p-2.5 rounded-xl bg-indigo-500/50 hover:bg-indigo-400 transition-all outline-none">
                <i id="theme-icon" data-lucide="moon" class="w-5 h-5 text-white" aria-hidden="true"></i>
            </button>
        </header>

        <div class="flex flex-col md:flex-row">
            <aside class="w-full md:w-64 bg-slate-50 dark:bg-slate-800/50 p-6 border-r border-slate-100 dark:border-slate-800">
                <nav aria-label="Filtros de categoría">
                    <h2 class="text-slate-400 dark:text-slate-500 font-bold uppercase text-[10px] tracking-widest mb-6">Categorías</h2>
                    <ul class="barra-lateral space-y-1" role="list">
                        <li data-filter="all" tabindex="0" role="button" aria-pressed="true" class="filter-btn flex items-center gap-3 cursor-pointer p-3 rounded-xl bg-indigo-600 text-white font-semibold outline-none shadow-md focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2 dark:focus:ring-offset-slate-800">
                            <i data-lucide="layout-grid" class="w-4 h-4" aria-hidden="true"></i> Todas
                        </li>
                        <li data-filter="trabajo" tabindex="0" role="button" aria-pressed="false" class="filter-btn flex items-center gap-3 cursor-pointer p-3 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-white dark:hover:bg-slate-800 transition-all outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2 dark:focus:ring-offset-slate-800">
                            <i data-lucide="briefcase" class="w-4 h-4" aria-hidden="true"></i> Trabajo
                        </li>
                        <li data-filter="casa" tabindex="0" role="button" aria-pressed="false" class="filter-btn flex items-center gap-3 cursor-pointer p-3 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-white dark:hover:bg-slate-800 transition-all outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2 dark:focus:ring-offset-slate-800">
                            <i data-lucide="home" class="w-4 h-4" aria-hidden="true"></i> Casa
                        </li>
                        <li data-filter="estudios" tabindex="0" role="button" aria-pressed="false" class="filter-btn flex items-center gap-3 cursor-pointer p-3 rounded-xl text-slate-600 dark:text-slate-300 hover:bg-white dark:hover:bg-slate-800 transition-all outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2 dark:focus:ring-offset-slate-800">
                            <i data-lucide="book-open" class="w-4 h-4" aria-hidden="true"></i> Estudios
                        </li>
                    </ul>
                </nav>
            </aside>

            <main class="flex-1 p-6 md:p-10 space-y-8 bg-white dark:bg-slate-900">
                
                <form id="task-form" class="flex flex-wrap gap-4 items-end" aria-label="Añadir nueva tarea">
                    <div class="flex-1 min-w-[250px] space-y-2">
                        <label for="task-input" class="text-[10px] font-bold uppercase text-slate-400 dark:text-slate-500 ml-1">Nueva Tarea</label>
                        <input type="text" id="task-input" placeholder="¿Qué tienes pendiente?" required maxlength="200" autocomplete="off"
                               class="w-full p-4 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                               aria-describedby="task-input-hint">
                        <span id="task-input-hint" class="sr-only">Escribe el título de la tarea y pulsa Enter o el botón para añadirla</span>
                    </div>
                    <div class="flex gap-2">
                        <select id="task-category-select" aria-label="Categoría de la tarea"
                                class="p-4 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                            <option value="trabajo">Trabajo</option>
                            <option value="casa">Casa</option>
                            <option value="estudios">Estudios</option>
                        </select>
                        <select id="task-priority-select" aria-label="Prioridad de la tarea"
                                class="p-4 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                            <option value="baja">Baja</option>
                            <option value="media" selected>Media</option>
                            <option value="alta">Alta</option>
                        </select>
                        <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold p-4 rounded-2xl transition-all active:scale-95 flex items-center justify-center" aria-label="Añadir tarea">
                            <i data-lucide="plus" class="w-6 h-6" aria-hidden="true"></i>
                        </button>
                    </div>
                </form>

                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-500">
                        <i data-lucide="search" class="w-5 h-5" aria-hidden="true"></i>
                    </div>
                    <input type="search" id="search-input" placeholder="Buscar tareas..." autocomplete="off"
                           class="w-full p-4 pl-12 rounded-2xl bg-slate-100 dark:bg-slate-800 border-none text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                           aria-label="Buscar tareas por título">
                </div>

                <section aria-label="Lista de tareas" aria-live="polite">
                    <div id="task-list" class="space-y-4"></div>
                    <p id="empty-state" class="hidden text-center py-12 text-slate-400 dark:text-slate-500" role="status"></p>
                </section>
            </main>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
