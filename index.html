<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Recordatorio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Gestor de Tareas</h1>
    </header>

    <div class="app-contenedor">
        <aside class="app-aside">
            <nav>
                <ul>
                    <li>Bases de datos</li>
                    <li>Desarrollo de aplicaciones web</li>
                    <li>Fol</li>
                    <li>Lenguaje de marcas</li>
                    <li>Fundamentos de hardware</li>
                </ul>
            </nav>
        </aside>

        <main class="contenido">
            <section class="tarjeta">
            <h2>Mis Tareas</h2>

            <div class="tarjeta-tareas alta">
                <span class="title">Conexiones</span>
                <span class="category">BBDD</span>
                <span class="badge">Alta</span>
            </div>

            <div class="tarjeta-tareas media">
                <span class="title">Tipos de Accidente</span>
                <span class="category">Fol</span>
                <span class="badge">Media</span>
            </div>

            <div class="tarjeta-tareas baja">
                <span class="title">Ver video</span>
                <span class="category">Lenguaje de marcas</span>
                <span class="badge">Baja</span>
            </div>

        </section>
        </main>
    </div>

</body>
</html>
